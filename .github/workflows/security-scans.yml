name: Security Scans

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Run Trivy scan for SARIF output
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    env:
      ZAP_TARGET_URL: ${{ secrets.ZAP_TARGET_URL }}

    steps:
      - name: Check ZAP target configuration
        id: zap_target_check
        run: |
          if [ -n "$ZAP_TARGET_URL" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "ZAP_TARGET_URL is not set. Skipping ZAP baseline scan."
          fi

      - name: Run ZAP baseline scan
        if: steps.zap_target_check.outputs.run_scan == 'true'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.ZAP_TARGET_URL }}
          cmd_options: '-a'
          fail_action: false

      - name: Upload ZAP report artifacts
        if: always() && steps.zap_target_check.outputs.run_scan == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          if-no-files-found: warn
          path: |
            report_html.html
            report_json.json
            report_md.md
