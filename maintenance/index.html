<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Homes Energy Savings Program - Scheduled Maintenance</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #005c97;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 60px 40px;
        text-align: center;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        background: #f3f4f6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon svg {
        width: 40px;
        height: 40px;
        color: #667eea;
      }

      h1 {
        color: #1f2937;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 20px;
      }

      .message {
        color: #6b7280;
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .info-box {
        background: #f9fafb;
        border-radius: 8px;
        padding: 20px;
        margin-top: 30px;
      }

      .info-box p {
        color: #4b5563;
        font-size: 14px;
        margin-bottom: 10px;
      }

      .info-box p:last-child {
        margin-bottom: 0;
      }

      .info-box strong {
        color: #1f2937;
      }

      @media (max-width: 480px) {
        .container {
          padding: 40px 24px;
        }

        h1 {
          font-size: 24px;
        }

        .message {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>

      <h1>
        Sorry!<br />
        We're doing some scheduled maintenance to the site.
      </h1>

      <p class="message">The Better Homes Energy Savings program website is temporarily down for maintenance.</p>

      <div class="info-box">
        <p>We are working as fast as we can to restore service.</p>
        <p>Please check back shortly!</p>
      </div>
    </div>
  </body>
</html>
