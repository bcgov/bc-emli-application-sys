# NGINX Proxy for CBC Cipher Compatibility
# Deploys an NGINX proxy pod to handle TLS 1.2 with older CBC ciphers
# This addresses OpenShift ingress controller limitations with legacy ciphers
# Place this in: helm/main/templates/nginx-proxy-deployment.yaml

{{- if .Values.nginxProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "main.fullname" . }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "main.labels" . | nindent 4 }}
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      client_max_body_size 50M;

      # Gzip compression
      gzip on;
      gzip_vary on;
      gzip_min_length 1000;
      gzip_types text/plain text/css text/xml text/javascript 
                 application/x-javascript application/xml+rss 
                 application/javascript;

      # Upstream to main application service
      upstream hesp_app {
        server {{ .Values.nginxProxy.upstreamHost }}:{{ .Values.nginxProxy.upstreamPort }};
      }

      # Upstream to WebSocket service
      upstream hesp_websocket {
        server {{ .Values.nginxProxy.websocketUpstreamHost }}:{{ .Values.nginxProxy.websocketUpstreamPort }};
      }

      # HTTP redirect to HTTPS
      server {
        listen 8080;
        server_name _;
        
        location / {
          return 301 https://$host$request_uri;
        }
      }

      # HTTPS server with legacy CBC cipher support
      server {
        listen 8443 ssl http2;
        server_name bcenergysavingsprogram.ca;

        # SSL Certificate paths (mounted from secret)
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        # TLS 1.2 + TLS 1.3 with GCM (preferred) and CBC (legacy) ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        # Trusted Entrust OV CA cert in use - HSTS safe to enable.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # WebSocket endpoint
        location /cable {
          proxy_pass http://hesp_websocket;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }

        # Main application
        location / {
          proxy_pass http://hesp_app;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;

          # Timeout settings
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /nginx-health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "main.fullname" . }}-nginx-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "main.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx-proxy
spec:
  replicas: {{ .Values.nginxProxy.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "main.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx-proxy
  template:
    metadata:
      labels:
        {{- include "main.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nginx-proxy
      annotations:
        # Reload nginx config when ConfigMap changes
        checksum/config: {{ .Values.nginxProxy | toYaml | sha256sum }}-v{{ .Values.nginxProxy.configVersion | default "1" }}
    spec:
      serviceAccountName: {{ .Values.global.serviceAccountName | default "default" }}
      
      {{- if .Values.nginxProxy.affinity }}
      affinity:
        {{- toYaml .Values.nginxProxy.affinity | nindent 8 }}
      {{- end }}

      containers:
      - name: nginx
        image: "{{ .Values.nginxProxy.image.repository }}:{{ .Values.nginxProxy.image.tag }}"
        imagePullPolicy: {{ .Values.nginxProxy.image.pullPolicy | default "IfNotPresent" }}
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP

        resources:
          {{- toYaml .Values.nginxProxy.resources | nindent 10 }}

        livenessProbe:
          httpGet:
            path: /nginx-health
            port: https
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /nginx-health
            port: https
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        - name: tls-certs
          mountPath: /etc/nginx/certs
          readOnly: true
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run

      volumes:
      - name: nginx-config
        configMap:
          name: {{ include "main.fullname" . }}-nginx-config
      - name: tls-certs
        secret:
          secretName: {{ .Values.nginxProxy.tlsSecretName | default "nginx-tls" }}
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "main.fullname" . }}-nginx-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "main.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx-proxy
spec:
  type: {{ .Values.nginxProxy.service.type | default "ClusterIP" }}
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8443
    protocol: TCP
    name: https
  selector:
    {{- include "main.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx-proxy

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "main.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "main.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx-proxy
spec:
  {{- with .Values.nginxProxy.route.host }}
  host: {{ . }}
  {{- end }}
  port:
    targetPort: https
  tls:
    termination: passthrough
  to:
    kind: Service
    name: {{ include "main.fullname" . }}-nginx-proxy
    weight: 100
  wildcardPolicy: None

{{- end }}
