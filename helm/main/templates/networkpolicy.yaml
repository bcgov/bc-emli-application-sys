apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "main.fullname" . }}-allow-from-openshift-ingress
spec:
  # This policy allows any pod with a route & service combination
  # to accept traffic from the OpenShift router pods. This is
  # required for things outside of OpenShift (like the Internet)
  # to reach your pods.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "main.fullname" . }}-allow-same-namespace
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  policyTypes:
    - Ingress
---
# Allow egress to external services (Keycloak, BCeID, AWS S3, etc.) and internal cluster services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "main.fullname" . }}-allow-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # External HTTPS (Keycloak, BCeID, AWS S3, loginproxy, etc.) + K8s API (443 and 6443)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Internal cluster services (HTTP, Redis, Sentinel, Postgres, ES, AnyCable)
    - ports:
        - port: 80
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 26379
          protocol: TCP
        - port: 9200
          protocol: TCP
        - port: 50051
          protocol: TCP
        - port: 3000
          protocol: TCP
