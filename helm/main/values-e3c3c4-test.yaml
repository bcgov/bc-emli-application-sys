# e3c3c4 Testing Environment - Medium Availability Values
# Testing environment with increased resources and replicas vs DEV, but lighter than PROD
# Deploy to e3c3c4-test namespace for QA/integration testing
# Use with: helm upgrade --install hesp ./helm/main \
#           -f helm/main/values.yaml \
#           -f helm/main/values-e3c3c4-test.yaml \
#           -n e3c3c4-test

global:
  licencePlate: e3c3c4

  # VAULT: Optional - only if using Vault for secret management
  # If using OpenShift Secrets only, leave vault config empty or comment out
  vault:
    role: ''
    subPath: ''
    podAnnotations: {}
      # VAULT DISABLED FOR TEST - Using OS Secrets
      # vault.hashicorp.com/agent-inject: "true"
      # vault.hashicorp.com/role: e3c3c4-test

  imagePullSecrets: []

  env:
    'SECRET_KEY_BASE': '1'
    'DATABASE_POOL': '10'

  envSecretName: hesp
  serviceAccountName: e3c3c4-vault

nameOverride: hesp
fullnameOverride: hesp

# ============================================================================
# APPLICATION TIER - TEST (Medium HA)
# ============================================================================

app:
  enabled: true

  # TEST: 2 replicas (medium HA - survives single pod failure)
  replicaCount: 2

  image:
    repository: ghcr.io/bcgov/hesp-app
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 500m
      memory: 1.5Gi
    requests:
      cpu: 300m
      memory: 1Gi

  dependencyWait:
    enabled: true
    services:
      - host: hesp-crunchydb-pgbouncer
        port: 5432
      - host: hesp-redis
        port: 6379

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - hesp-app
            topologyKey: kubernetes.io/hostname

  livenessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

  env:
    'VITE_SUBMIT_INVOICE_ENABLED': 'true'
    'ANYCABLE_URL': 'wss://hesp-anycable.apps.gold.devops.gov.bc.ca/cable'
    'IS_APP_SERVER': true
    'CLAMAV_TIMEOUT': '30'
    'VIRUS_SCAN_TEMP_DIR': '/tmp/virus_scan'
    'UPLOAD_VIRUS_SCAN_TIMEOUT': '45'
    'RAILS_CONSOLE_ENV_LABEL': 'test'
    # Note: AWS_REGION, AWS_DEFAULT_REGION, AWS_PARAMETER_BASE_PATH and other
    # shared config are provided via hesp-config ConfigMap

  route:
    enabled: true
    host: test-hesp.apps.gold.devops.gov.bc.ca

# ============================================================================
# BACKGROUND JOB PROCESSING - TEST
# ============================================================================

sidekiq:
  enabled: true

  replicaCount: 2 # TEST: 2 replicas for redundancy

  # Recreate avoids Vite chunk hash mismatches during rolling deploys (white screen).
  strategy:
    type: Recreate

  image:
    repository: ghcr.io/bcgov/hesp-app
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 300m
      memory: 1Gi
    requests:
      cpu: 150m
      memory: 512Mi

  dependencyWait:
    enabled: true
    services:
      - host: hesp-crunchydb-pgbouncer
        port: 5432
      - host: hesp-redis
        port: 6379

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Restart Sidekiq if it loses its Redis/Sentinel connection.
  # timeoutSeconds: 30 — rails runner boots the full Rails env (S3, Redis Sentinel,
  # cron-job loading, etc.) which consistently exceeds 10s. 30s gives headroom.
  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - bundle exec rails runner "Sidekiq.redis { |r| r.ping }"
    initialDelaySeconds: 60
    periodSeconds: 60
    failureThreshold: 3
    timeoutSeconds: 30

  env:
    'SIDEKIQ_CONCURRENCY': '10'
    'DATABASE_POOL': '15'
    # Note: FROM_EMAIL, AWS_REGION, AWS_DEFAULT_REGION, AWS_PARAMETER_BASE_PATH
    # and other shared config are provided via hesp-config ConfigMap

# ============================================================================
# ANYCABLE RPC - TEST
# ============================================================================

anycable-rpc:
  enabled: true

  replicaCount: 2 # TEST: 2 replicas

  image:
    repository: ghcr.io/bcgov/hesp-app
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 300m
      memory: 384Mi
    requests:
      cpu: 150m
      memory: 192Mi

  dependencyWait:
    enabled: true
    services:
      - host: hesp-crunchydb-pgbouncer
        port: 5432
      - host: hesp-redis
        port: 6379

  env: {}
  # Note: AWS_PARAMETER_BASE_PATH, AWS_REGION, AWS_DEFAULT_REGION and all shared
  # S3/AWS config are provided via hesp-config ConfigMap

# ============================================================================
# DATABASE - TEST (Medium HA)
# ============================================================================

crunchy-postgres:
  enabled: true

  postgresVersion: 16

  # TEST: 2 replicas (one primary + one replica)
  instances:
    name: ha
    replicas: 2

    livenessProbe:
      exec:
        command: ['pg_isready', '-U', 'postgres']
      initialDelaySeconds: 10
      timeoutSeconds: 5
      periodSeconds: 10
      failureThreshold: 6

    dataVolumeClaimSpec:
      storage: 3Gi # TEST: Reduced to fit namespace quota
      storageClassName: netapp-block-standard

    requests:
      cpu: 75m
      memory: 384Mi

    replicaCertCopy:
      requests:
        cpu: 10m
        memory: 32Mi

  # pgBackRest configuration - TEST with basic backups
  pgBackRest:
    image:

    retention: '2' # Keep 2 backups
    retentionFullType: time

    repos:
      schedules:
        # TEST: Daily full backup at 2 AM
        full: '0 2 * * *'
        # TEST: No incremental backups (full is sufficient for test)
        incremental: '0 0 1 1 *'

      volume:
        accessModes: 'ReadWriteOnce'
        storage: 1Gi # TEST: Reduced backup storage
        storageClassName: netapp-file-backup

    repoHost:
      requests:
        cpu: 10m
        memory: 64Mi
        livenessProbe:
          exec:
            command:
              - pgbackrest
              - server-ping
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6

    sidecars:
      requests:
        cpu: 10m
        memory: 64Mi

    # TEST: S3 backups enabled
    s3:
      enabled: true
      createS3Secret: false
      s3Secret: pgbackrest-s3-credentials
      s3Path: '/pgbackup-test'
      s3UriStyle: path
      bucket: 'hesp-dev-cacentral1-s3pgbackup'
      endpoint: 's3.ca-central-1.amazonaws.com'
      region: 'ca-central-1'
      key: ''
      keySecret: ''

  patroni:
    postgresql:
      pg_hba: 'host all all 0.0.0.0/0 md5'
      parameters:
        shared_buffers: 128MB # TEST: Medium
        wal_buffers: '64kB'
        min_wal_size: 32MB
        max_wal_size: 128MB
        max_slot_wal_keep_size: 256MB
        wal_level: replica
        max_wal_senders: 10
        max_replication_slots: 10
        hot_standby: 'on'
        hot_standby_feedback: 'on'
        wal_retrieve_retry_interval: '5s'

  proxy:
    pgBouncer:
      image:
      replicas: 1
      requests:
        cpu: 50m
        memory: 64Mi

  pgmonitor:
    enabled: false # TEST: Disable monitoring

# ============================================================================
# CACHE - TEST (Medium HA)
# ============================================================================

redis:
  enabled: true
  architecture: replication

  commonConfiguration: |-
    appendonly yes
    save ""

  global:
    compatibility:
      openshift:
        adaptSecurityContext: force
    security:
      allowInsecureImages: true

  image:
    registry: registry-1.docker.io
    repository: bitnami/redis
    digest: sha256:23289a4f4765da46419590fb80d8803363b07e5783ef45396ff85c641db81a0e

  replicaCount: 2 # TEST: 2 replicas (master + 1)

  fullnameOverride: hesp-redis

  auth:
    enabled: false
    sentinel: false
    usePasswordFiles: false

  sentinel:
    enabled: true

    image:
      registry: registry-1.docker.io
      repository: bitnami/redis-sentinel
      digest: sha256:d637c733e704abaa90f3bc032c7e0a6b99a2c94d024287cf17f5f5af97818cdd

    masterSet: redisMasterSet

    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

    resources:
      requests:
        memory: 128Mi
        cpu: 25m

    replicas: 2

  master:
    persistence:
      enabled: true
      size: 256Mi
      storageClass: netapp-block-standard

  replica:
    replicaCount: 1
    shareProcessNamespace: true

    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

    persistence:
      enabled: true
      size: 256Mi
      storageClassName: netapp-block-standard

    resources:
      requests:
        memory: 128Mi
        cpu: 25m

# ============================================================================
# SEARCH - TEST (Medium)
# ============================================================================

elasticsearch:
  enabled: true

  global:
    security:
      allowInsecureImages: true

  image:
    registry: docker.io
    repository: bitnamilegacy/elasticsearch
    tag: 9.1.2-debian-12-r0

  fullnameOverride: hesp-elasticsearch
  clusterName: hesp-elasticsearch
  clusterHealthCheckParams: 'wait_for_status=yellow&timeout=5s'

  master:
    replicaCount: 1 # TEST: Single master (resource-light)
    heapSize: 512m

    networkPolicy:
      enabled: false
      allowExternal: false

    resources:
      requests:
        cpu: 100m
        memory: 768Mi
      limits:
        cpu: 500m
        memory: 1Gi

    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 512Mi
      storageClassName: netapp-block-standard

    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

    livenessProbe:
      enabled: true
      initialDelaySeconds: 1200
      periodSeconds: 15
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

  data:
    replicaCount: 1 # TEST: Single data node (resource-light)
    heapSize: 512m

    networkPolicy:
      enabled: false
      allowExternal: false

    resources:
      requests:
        cpu: 100m
        memory: 768Mi
      limits:
        cpu: 500m
        memory: 1Gi

    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 512Mi
      storageClassName: netapp-block-standard

    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

    livenessProbe:
      enabled: true
      initialDelaySeconds: 1200
      periodSeconds: 15
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

  coordinating:
    replicaCount: 0
  ingest:
    replicaCount: 0

  security:
    enabled: false
    fipsMode: false
    tls:
      restEncryption: false
      autoGenerated: false

  metrics:
    enabled: false

# ============================================================================
# WEBSOCKET SERVER - TEST
# ============================================================================

anycableGo:
  enabled: true

  nameOverride: hesp-anycable-go
  fullnameOverride: hesp-anycable-go

  replicas: 2 # TEST: 2 replicas for redundancy

  dependencyWait:
    enabled: true
    services:
      - host: hesp-redis
        port: 26379
      - host: hesp-redis
        port: 6379

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - hesp-anycable-go
            topologyKey: kubernetes.io/hostname

  env:
    anycableRpcHost: hesp-anycable-rpc:50051
    anycableRedisUrl: 'redis://redisMasterSet:6379/1'
    anycableRedisSentinels: 'hesp-redis:26379'

  route:
    enabled: false # Route handled by nginx proxy

  ingress:
    enable: false

  resources:
    requests:
      cpu: 30m
      memory: 192Mi
    limits:
      cpu: 150m
      memory: 384Mi

# ============================================================================
# ANTIVIRUS - TEST
# ============================================================================

clamav:
  enabled: true # TEST: Enabled (like PROD, not like DEV)

  image:
    repository: ghcr.io/bcgov/hesp-clamav
    pullPolicy: IfNotPresent

  nameOverride: hesp-clamav
  fullnameOverride: hesp-clamav

  persistence:
    enabled: true
    storageClass: netapp-block-standard
    size: 128Mi

  virusScanTempVolume:
    enabled: true
    storageClass: netapp-file-standard
    size: 256Mi

# ============================================================================
# NGINX PROXY - CBC Cipher Compatibility
# ============================================================================

nginxProxy:
  enabled: false # TEST: Enable for testing CBC cipher compatibility

  image:
    repository: docker.io/nginx
    tag: 'alpine'
    pullPolicy: IfNotPresent

  replicas: 2 # TEST: 2 replicas for redundancy

  upstreamHost: 'hesp-app'
  upstreamPort: 3000
  websocketUpstreamHost: 'hesp-anycable-go'
  websocketUpstreamPort: 8080

  tlsSecretName: 'hesp-tls' # Must be created in e3c3c4-test namespace

  resources:
    requests:
      cpu: 75m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - nginx-proxy
            topologyKey: kubernetes.io/hostname

  service:
    type: ClusterIP

  route:
    host: 'test-hesp.apps.gold.devops.gov.bc.ca' # TEST route

# ============================================================================
# SHARED CONFIGURATION OVERRIDES - TEST
# ============================================================================

sharedConfig:
  enabled: true

  redis:
    sentinelHeadless: hesp-redis
    sentinelPort: '26379'
    masterSetName: redisMasterSet
    sidekiqDb: '0'

  aws:
    region: ca-central-1
    defaultRegion: ca-central-1
    parameterBasePath: '/iam_users/BCGOV_WORKLOAD_admin_709391fb7b5745eda96357051a2372cf_keys'

  s3:
    region: ca-central-1
    endpoint: https://s3.ca-central-1.amazonaws.com
    publicEndpoint: https://s3.ca-central-1.amazonaws.com
    bucket: hesp-dev-cacentral1-bucket

  app:
    domain: test-hesp.apps.gold.devops.gov.bc.ca
    clamscanEnabled: 'true'
    fromEmail: 'no-reply@gov.bc.ca'
    clamavHost: 'hesp-clamav'
    clamavPort: '3310'

  anycable:
    rpcHost: hesp-anycable-rpc:50051
    redisUrl: 'redis://redisMasterSet:6379/1'
    redisSentinels: 'hesp-redis:26379'

  auth:
    keycloakUrl: https://test.loginproxy.gov.bc.ca/
    keycloakLogoutUrl: https://test.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/logout
    siteminderLogoutUrl: https://logontest7.gov.bc.ca/clp-cgi/logoff.cgi
    bceidUrl: https://www.development.bceid.ca
    bceidBusinessRegistrationUrl: https://www.development.bceid.ca/register/business/getting_started/getting_started.aspx
    postLogoutRedirectUrl: https://test-hesp.apps.gold.devops.gov.bc.ca

# ============================================================================
# S3 KEY ROTATION
# ============================================================================
s3KeyRotation:
  enabled: true
  schedule: '0 */2 * * *'
  syncPgbackrestSecret: false
  parameterStorePath: '/iam_users/BCGOV_WORKLOAD_admin_709391fb7b5745eda96357051a2372cf_keys'

# ============================================================================
# AUDIT LOG ARCHIVE + PRUNE
# ============================================================================
auditLogArchive:
  enabled: true
  # Weekly Sunday 11:00 PM local time.
  schedule: '0 23 * * 0'
  timeZone: 'America/Vancouver'
  env:
    AUDIT_LOG_RETENTION_DAYS: '30'
    AUDIT_LOG_ARCHIVE_PREFIX: 'audit-log-archives/test'
    # Dedicated archive bucket only for audit logs, separate from app uploads/db backups.
    AUDIT_LOG_ARCHIVE_S3_BUCKET: 'hesp-dev-cacentral1-audit-storage'
