global:
  licencePlate: e3c3c4
  serviceAccountName: default
  envSecretName: ''
  imagePullSecrets: []

# TLS/cipher POC only: disable application workloads
app:
  enabled: false

sidekiq:
  enabled: false

anycable-rpc:
  enabled: false

crunchy-postgres:
  enabled: false

redis:
  enabled: false

elasticsearch:
  enabled: false

anycableGo:
  enabled: false

clamav:
  enabled: false

# Only nginx proxy is deployed for passthrough TLS validation
nginxProxy:
  enabled: true
  replicas: 1

  # Keep upstream resolvable even with app disabled
  # Requests to '/' may return 502, but '/nginx-health' will return 200 for TLS tests
  upstreamHost: kubernetes.default.svc
  upstreamPort: 443
  websocketUpstreamHost: kubernetes.default.svc
  websocketUpstreamPort: 443

  tlsSecretName: hesp-tls

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  route:
    host: ''
