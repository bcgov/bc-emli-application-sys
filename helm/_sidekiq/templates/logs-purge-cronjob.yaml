{{- if .Values.logVolume.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "_.fullname" . }}-purge-logs
spec:
  schedule: "0 0 * * *"
  successfulJobsHistoryLimit: 1  # Keep only last successful run (daily job)
  failedJobsHistoryLimit: 1  # Keep only 1 failed Job
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600  # Deletes Jobs and their pods 10 minutes after completion
      template:
        spec:
          containers:
            # application.log → 14d (matches the app pod; this is the space-hungry file).
            # sidekiq.log     → 30d (durable job-forensics record; tiny volume).
            - name: log-purger
              image: alpine:3.21.3
              command: ["/bin/sh"]
              args:
                - "-c"
                - >
                  echo "Starting log purge: $(date)";
                  find /app/log -name 'application.log*' -type f -mtime +14 -exec rm -v {} + ;
                  find /app/log -name 'sidekiq.log*' -type f -mtime +30 -exec rm -v {} + ;
                  echo "Log purge completed: $(date)";
              volumeMounts:
                - name: log-volume
                  mountPath: /app/log
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
          restartPolicy: OnFailure
          volumes:
            - name: log-volume
              persistentVolumeClaim:
                claimName: {{ include "_.fullname" . }}-log
{{- end }}
