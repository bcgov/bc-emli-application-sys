replicaCount: 1

image:
  repository: ghcr.io/bcgov/hesp-app
  # repository: artifacts.developer.gov.bc.ca/bbfc-dev/hesp-dev
  tag: main
  pullPolicy: Always

imagePullSecrets: []
nameOverride: hesp-sidekiq
fullnameOverride: hesp-sidekiq

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

crunchydbSecret: hesp-crunchydb-pguser-postgres

serviceAccountName:
envSecretName:
env: {}

# livenessProbe: Disabled by default. Enable in environment values to auto-restart
# Sidekiq when it loses its Redis connection (e.g. after a Sentinel failover).
# NOTE: timeoutSeconds must be >= 30. The `rails runner` command boots the full
# Rails environment (S3, Redis Sentinel, cron jobs, etc.) before executing,
# which takes well over 10s. Setting it lower will cause spurious probe failures.
livenessProbe: {}
  # exec:
  #   command:
  #     - /bin/sh
  #     - -c
  #     - bundle exec rails runner "Sidekiq.redis { |r| r.ping }"
  # initialDelaySeconds: 60
  # periodSeconds: 60
  # failureThreshold: 3
  # timeoutSeconds: 30

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

dependencyWait:
  enabled: false
  image:
    repository: docker.io/busybox
    tag: '1.36'
    pullPolicy: IfNotPresent
  services: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

logVolume:
  enabled: false
  storage: 512Mi

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
